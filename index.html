<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sync Master Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Prompt:wght@300;400;500;600;700&display=swap');
        :root { --accent: #f43f5e; }

        [data-theme="slate"] {
            --primary: #6366f1; --primary-glow: rgba(99,102,241,0.4);
            --glass-card: rgba(30,41,59,0.6); --border-dark: rgba(255,255,255,0.08);
            --bg-grad-1: #0f172a; --bg-grad-2: #020617;
            --nav-bg: rgba(15,23,42,0.85); --input-bg: rgba(15,23,42,0.8);
            --text-main: #f8fafc; --text-sub: #94a3b8;
            --card-bg: rgba(30,41,59,0.7); --hover-bg: rgba(255,255,255,0.05);
            --section-bg: rgba(30,41,59,0.9); --border-subtle: rgba(255,255,255,0.08);
        }
        [data-theme="nord"] {
            --primary: #81a1c1; --primary-glow: rgba(129,161,193,0.4);
            --glass-card: rgba(59,66,82,0.8); --border-dark: rgba(216,222,233,0.1);
            --bg-grad-1: #2e3440; --bg-grad-2: #242933;
            --nav-bg: rgba(46,52,64,0.95); --input-bg: rgba(67,76,94,0.8);
            --text-main: #eceff4; --text-sub: #d8dee9;
            --card-bg: rgba(59,66,82,0.7); --hover-bg: rgba(255,255,255,0.05);
            --section-bg: rgba(59,66,82,0.9); --border-subtle: rgba(216,222,233,0.1);
        }
        [data-theme="mocha"] {
            --primary: #d08770; --primary-glow: rgba(208,135,112,0.4);
            --glass-card: rgba(60,56,54,0.8); --border-dark: rgba(235,219,178,0.08);
            --bg-grad-1: #282828; --bg-grad-2: #1d2021;
            --nav-bg: rgba(40,40,40,0.95); --input-bg: rgba(50,48,47,0.8);
            --text-main: #ebdbb2; --text-sub: #a89984;
            --card-bg: rgba(60,56,54,0.7); --hover-bg: rgba(255,255,255,0.05);
            --section-bg: rgba(60,56,54,0.9); --border-subtle: rgba(235,219,178,0.08);
        }
        [data-theme="dracula"] {
            --primary: #bd93f9; --primary-glow: rgba(189,147,249,0.4);
            --glass-card: rgba(68,71,90,0.7); --border-dark: rgba(248,248,242,0.08);
            --bg-grad-1: #282a36; --bg-grad-2: #21222c;
            --nav-bg: rgba(40,42,54,0.9); --input-bg: rgba(68,71,90,0.5);
            --text-main: #f8f8f2; --text-sub: #6272a4;
            --card-bg: rgba(68,71,90,0.7); --hover-bg: rgba(255,255,255,0.05);
            --section-bg: rgba(68,71,90,0.9); --border-subtle: rgba(248,248,242,0.08);
        }
        [data-theme="light"] {
            --primary: #6366f1; --primary-glow: rgba(99,102,241,0.3);
            --glass-card: rgba(255,255,255,0.7); --border-dark: rgba(0,0,0,0.08);
            --bg-grad-1: #f8fafc; --bg-grad-2: #e2e8f0;
            --nav-bg: rgba(255,255,255,0.9); --input-bg: rgba(241,245,249,0.9);
            --text-main: #0f172a; --text-sub: #64748b;
            --card-bg: rgba(255,255,255,0.8); --hover-bg: rgba(0,0,0,0.03);
            --section-bg: rgba(255,255,255,0.95); --border-subtle: rgba(0,0,0,0.08);
        }

        body { font-family: 'Outfit','Prompt',sans-serif; background: radial-gradient(circle at top center,var(--bg-grad-1),var(--bg-grad-2)); background-attachment: fixed; color: var(--text-main); min-height: 100vh; scroll-behavior: smooth; transition: background 0.5s ease; }
        .glass-card { background-color: var(--glass-card); backdrop-filter: blur(12px) saturate(150%); border: 1px solid var(--border-dark); transition: all 0.3s ease; }
        .card-bg { background-color: var(--card-bg); }
        .section-bg { background-color: var(--section-bg); }
        .text-main { color: var(--text-main); }
        .text-sub { color: var(--text-sub); }
        .nav-bg { background-color: var(--nav-bg); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border-dark); }
        .input-bg { background-color: var(--input-bg); color: var(--text-main); border: 1px solid var(--border-dark); }
        .input-bg:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 0 2px var(--primary-glow); }
        .hover-bg:hover { background-color: var(--hover-bg); }
        .border-subtle { border-color: var(--border-subtle); }
        .tab-active { color: var(--primary); border-color: var(--primary); font-weight: 600; }
        .tab-inactive { color: var(--text-sub); }
        .tab-inactive:hover { color: var(--text-main); }

        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); z-index: 100; display: flex; align-items: center; justify-content: center; }
        .note-textarea { min-height: 80px; resize: vertical; }
        .emoji-picker { display: flex; flex-wrap: wrap; gap: 4px; max-height: 120px; overflow-y: auto; }
        .emoji-picker button { font-size: 18px; padding: 4px; border: none; background: none; cursor: pointer; border-radius: 6px; }
        .emoji-picker button:hover { background: var(--hover-bg); }
        .stock-bar { height: 100%; border-radius: 9999px; transition: width 1s ease; }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-grad-2); }
        ::-webkit-scrollbar-thumb { background-color: var(--primary); border-radius: 10px; opacity: 0.5; }
        ::-webkit-scrollbar-thumb:hover { background-color: var(--text-sub); }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .animate-slide-up { animation: slideUp 0.5s ease forwards; }
        .fade-in { animation: slideUp 0.4s ease-out forwards; }

        .main-grid { display: grid; grid-template-columns: 1fr 350px; gap: 2rem; }
        @media (max-width: 1024px) { .main-grid { grid-template-columns: 1fr; } }
        .kanban-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 1rem; align-items: start; }
        @media (max-width: 768px) { .kanban-grid { grid-template-columns: 1fr; } }
        .kanban-col { min-height: 400px; padding: 12px; border-radius: 16px; }
        .kanban-item { cursor: grab; }
        .kanban-item:active { cursor: grabbing; }
        .badge { padding: 2px 8px; border-radius: 9999px; font-size: 10px; font-weight: bold; text-transform: uppercase; letter-spacing: 0.05em; }
        .badge-urgent { background: rgba(244,63,94,0.1); color: #f43f5e; border: 1px solid rgba(244,63,94,0.2); }
        .badge-normal { background: rgba(16,185,129,0.1); color: #10b981; border: 1px solid rgba(16,185,129,0.2); }
        .launcher-btn { transition: all 0.3s cubic-bezier(0.175,0.885,0.32,1.275); }
        .launcher-btn:hover { transform: scale(1.1) rotate(3deg); }
        .deadline-warning { animation: pulseRed 2s infinite; color: var(--accent); font-weight: 700; }
        @keyframes pulseRed { 0%{opacity:1} 50%{opacity:0.5} 100%{opacity:1} }
        .card-hover { transition: all 0.3s ease; }
        .card-hover:hover { transform: translateY(-5px); box-shadow: 0 12px 40px rgba(0,0,0,0.1); }

        /* Responsive */
        @media (max-width: 640px) {
            .nav-title { display: none; }
            .nav-right { gap: 4px; }
            .nav-right select { font-size: 11px; padding: 4px 8px; }
            .nav-right button { padding: 4px 8px; font-size: 11px; }
        }
        @media (max-width: 480px) {
            .main-grid { gap: 1rem; }
            body { font-size: 14px; }
        }
    </style>
</head>
<body data-theme="slate">

<!-- NAV -->
<nav class="nav-bg sticky top-0 z-50">
    <div class="max-w-[1600px] mx-auto px-2 sm:px-4 lg:px-8">
        <div class="flex items-center justify-between h-14 sm:h-16 flex-wrap gap-y-1">
            <div class="flex items-center gap-2 sm:gap-3 min-w-0">
                <i class="fa-solid fa-layer-group text-xl sm:text-2xl" style="color:var(--primary)"></i>
                <span class="font-bold text-base sm:text-xl text-main tracking-wide nav-title truncate">Sync Master Dashboard</span>
            </div>
            <div class="flex items-center gap-1 sm:gap-2 nav-right flex-shrink-0">
                <button onclick="exportAllData()" class="p-1.5 sm:p-2 rounded-lg hover-bg transition-colors text-main" title="Export"><i class="fa-solid fa-download text-xs sm:text-sm"></i></button>
                <button onclick="document.getElementById('import-file').click()" class="p-1.5 sm:p-2 rounded-lg hover-bg transition-colors text-main" title="Import"><i class="fa-solid fa-upload text-xs sm:text-sm"></i></button>
                <input type="file" id="import-file" accept=".json" class="hidden" onchange="importAllData(event)">
                <select id="theme-selector" onchange="changeTheme(this.value)" class="input-bg text-xs sm:text-sm px-2 sm:px-3 py-1 sm:py-1.5 rounded-lg cursor-pointer outline-none">
                    <option value="slate">🌙 Slate</option>
                    <option value="nord">❄️ Nord</option>
                    <option value="mocha">☕ Mocha</option>
                    <option value="dracula">🧛 Dracula</option>
                    <option value="light">☀️ Light</option>
                </select>
                <button onclick="logout()" class="text-xs sm:text-sm font-medium text-main hover:text-rose-400 transition-colors hover-bg px-2 sm:px-3 py-1 sm:py-1.5 rounded-lg border" style="border-color:var(--border-dark)">
                    <i class="fa-solid fa-key"></i><span class="hidden sm:inline ml-1">Key</span>
                </button>
            </div>
        </div>
    </div>
</nav>

<!-- LOGIN -->
<div id="login-section" class="max-w-md mx-auto mt-12 sm:mt-24 glass-card p-4 sm:p-8 rounded-2xl shadow-2xl hidden mx-4 sm:mx-auto">
    <div class="text-center mb-6">
        <div class="w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4 border" style="background:var(--primary-glow);border-color:var(--border-dark)">
            <i class="fa-solid fa-lock text-2xl" style="color:var(--primary)"></i>
        </div>
        <h2 class="text-2xl font-bold text-main">Google Sheets Access</h2>
        <p class="text-sub mt-2 text-sm">กรุณาใส่ Google API Key ของคุณ</p>
    </div>
    <div class="space-y-4">
        <input type="password" id="api-key-input" placeholder="วาง API Key (AIza...) ที่นี่..." class="w-full px-4 py-3 rounded-lg input-bg transition-all text-sm">
        <button onclick="saveApiKey()" class="w-full text-white font-bold py-3 rounded-lg shadow-lg transition-all" style="background-color:var(--primary);">เชื่อมต่อระบบ</button>
        <div class="text-xs text-sub text-center mt-4">* AIzaSyAihSSlxF8yeYd0GhyMea4s9vb0aVbY8qw</div>
    </div>
</div>

<!-- LOADING -->
<div id="loading-section" class="max-w-7xl mx-auto mt-32 text-center hidden">
    <div class="inline-block animate-spin rounded-full h-14 w-14 border-4 border-t-transparent mb-6" style="border-color:var(--primary);border-top-color:transparent;"></div>
    <h3 class="text-xl font-medium text-main" id="loading-text">กำลังโหลดข้อมูล...</h3>
    <p class="text-sub mt-2 text-sm" id="loading-subtext">ประมวลผลและเชื่อมต่อ Google Sheets</p>
</div>

<!-- DASHBOARD -->
<div id="dashboard-section" class="max-w-[1600px] mx-auto px-2 sm:px-4 lg:px-8 py-4 sm:py-8 hidden">
    <div class="main-grid">
        <div class="space-y-6">
            <div class="flex items-center glass-card rounded-xl px-1 sm:px-2 overflow-x-auto scrollbar-thin" id="tabs-bar" style="-webkit-overflow-scrolling:touch;"></div>
            <div id="tab-content" class="fade-in min-h-[300px] sm:min-h-[500px]"></div>
        </div>
        <div class="space-y-6 hidden lg:block">
            <div class="glass-card rounded-2xl p-6 sticky top-24">
                <h3 class="text-sm font-bold text-main mb-4 flex items-center gap-2 tracking-wide uppercase">
                    <i class="fa-solid fa-rocket" style="color:var(--primary)"></i> Quick Launcher
                </h3>
                <div id="program-launcher-grid" class="grid grid-cols-2 gap-3 mb-3"></div>
                <a href="https://docs.google.com/spreadsheets/d/1yamIh1Uvb3hlPp3earQglGyUMtsNqPPLLe65lR53rNY/edit" target="_blank" class="glass-card hover-bg p-3 rounded-xl flex flex-col items-center gap-2 text-center group transition-colors border-l-4 border-l-emerald-500 mb-2 block">
                    <i class="fa-solid fa-file-excel text-emerald-400 text-xl group-hover:scale-110 transition-transform"></i>
                    <span class="text-[10px] font-bold text-main">Sheet งานต้น</span>
                </a>
                <a href="https://docs.google.com/spreadsheets/d/14jiUb5-96MY6rCIJTWkbcSBmbvCk_v8HdVRc589MjrU/edit" target="_blank" class="glass-card hover-bg p-3 rounded-xl flex flex-col items-center gap-2 text-center group transition-colors border-l-4 border-l-sky-500 mb-2 block">
                    <i class="fa-solid fa-file-excel text-sky-400 text-xl group-hover:scale-110 transition-transform"></i>
                    <span class="text-[10px] font-bold text-main">Sheet งานลุงตี่</span>
                </a>
                <button onclick="forceSyncAll()" class="w-full glass-card hover-bg p-3 rounded-xl flex items-center justify-center gap-2 text-center group transition-colors">
                    <i class="fa-solid fa-rotate-right text-sm group-hover:-rotate-180 transition-transform duration-500" style="color:var(--primary)" id="sync-icon"></i>
                    <span class="text-[12px] font-bold text-main">Sync ข้อมูลทั้งหมด</span>
                </button>
            </div>
            <div class="glass-card rounded-2xl p-6">
                <div class="flex items-center justify-between mb-4">
                    <h3 class="text-sm font-bold text-main flex items-center gap-2 tracking-wide uppercase">
                        <i class="fa-solid fa-list-check text-rose-400"></i> งานประจำวัน
                    </h3>
                    <button onclick="switchTab('todo')" class="text-[10px] hover:underline" style="color:var(--primary)">View All</button>
                </div>
                <div class="flex gap-2 mb-4">
                    <input id="mini-todo-input" type="text" placeholder="พิมพ์งานด่วน..." class="input-bg w-full px-3 py-2 text-xs rounded-lg">
                    <button onclick="addMiniTodo()" class="text-white px-3 py-2 rounded-lg text-xs font-bold" style="background-color:var(--primary);"><i class="fa-solid fa-plus"></i></button>
                </div>
                <div id="todo-preview-list" class="space-y-2 max-h-[400px] overflow-y-auto pr-1"></div>
            </div>
        </div>
    </div>
</div>

<!-- MODAL: Create Tab -->
<div id="modal-create-tab" class="modal-overlay hidden" onclick="if(event.target===this)closeModal('modal-create-tab')">
    <div class="section-bg rounded-2xl shadow-2xl p-6 w-full max-w-md mx-4 fade-in">
        <h3 class="text-lg font-bold text-main mb-4"><i class="fa-solid fa-plus-circle mr-2" style="color:var(--primary)"></i>สร้าง Tab ใหม่</h3>
        <div class="space-y-4">
            <div><label class="text-sm text-sub font-medium">ชื่อ Tab</label><input id="new-tab-name" class="w-full mt-1 px-4 py-2.5 rounded-lg input-bg" placeholder="เช่น งานพิเศษ"></div>
            <div><label class="text-sm text-sub font-medium">Emoji</label>
                <div class="mt-1 flex items-center gap-3"><span id="new-tab-emoji-preview" class="text-3xl cursor-pointer" onclick="document.getElementById('new-tab-emoji-picker').classList.toggle('hidden')">📁</span><input id="new-tab-emoji-input" class="w-full px-4 py-2.5 rounded-lg input-bg" placeholder="วาง emoji" oninput="document.getElementById('new-tab-emoji-preview').innerText=this.value||'📁'"></div>
                <div id="new-tab-emoji-picker" class="emoji-picker mt-2 hidden"></div>
            </div>
            <div class="flex gap-3 pt-2">
                <button onclick="closeModal('modal-create-tab')" class="flex-1 py-2.5 rounded-lg border text-sub hover-bg transition-colors" style="border-color:var(--border-dark)">ยกเลิก</button>
                <button onclick="createCustomTab()" class="flex-1 py-2.5 rounded-lg text-white font-semibold transition-colors" style="background-color:var(--primary)">สร้าง</button>
            </div>
        </div>
    </div>
</div>

<!-- MODAL: Create Box -->
<div id="modal-create-box" class="modal-overlay hidden" onclick="if(event.target===this)closeModal('modal-create-box')">
    <div class="section-bg rounded-2xl shadow-2xl p-6 w-full max-w-md mx-4 fade-in" style="max-height:90vh;overflow-y:auto">
        <h3 class="text-lg font-bold text-main mb-4"><i class="fa-solid fa-box-open mr-2" style="color:var(--primary)"></i>สร้างกล่องติดตามงาน</h3>
        <div class="space-y-4">
            <div><label class="text-sm text-sub font-medium">ชื่อกล่อง</label><input id="new-box-name" class="w-full mt-1 px-4 py-2.5 rounded-lg input-bg" placeholder="เช่น งานคลิปสั้น"></div>
            <div><label class="text-sm text-sub font-medium">Emoji</label>
                <div class="mt-1 flex items-center gap-3"><span id="new-box-emoji-preview" class="text-3xl cursor-pointer" onclick="document.getElementById('new-box-emoji-picker').classList.toggle('hidden')">📦</span><input id="new-box-emoji-input" class="w-full px-4 py-2.5 rounded-lg input-bg" placeholder="วาง emoji" oninput="document.getElementById('new-box-emoji-preview').innerText=this.value||'📦'"></div>
                <div id="new-box-emoji-picker" class="emoji-picker mt-2 hidden"></div>
            </div>
            <div><label class="text-sm text-sub font-medium">Spreadsheet ID</label><input id="new-box-sheet-id" class="w-full mt-1 px-4 py-2.5 rounded-lg input-bg text-xs" placeholder="เช่น 14jiUb5-96MY6rCIJTWkbcSBmbvCk..."></div>
            <div class="grid grid-cols-2 gap-3">
                <div><label class="text-sm text-sub font-medium">ชื่อ Sheet</label><input id="new-box-sheet-name" class="w-full mt-1 px-4 py-2.5 rounded-lg input-bg" placeholder="เช่น ทั้งหมด"></div>
                <div><label class="text-sm text-sub font-medium">Cell</label><input id="new-box-cell" class="w-full mt-1 px-4 py-2.5 rounded-lg input-bg" placeholder="เช่น K2"></div>
            </div>
            <div><label class="text-sm text-sub font-medium">Link (ไม่บังคับ)</label><input id="new-box-link" class="w-full mt-1 px-4 py-2.5 rounded-lg input-bg text-xs" placeholder="https://..."></div>
            <div><label class="text-sm text-sub font-medium">สีธีม</label>
                <div class="flex gap-2 mt-1 flex-wrap">
                    <button onclick="selectBoxColor('indigo')" class="w-8 h-8 rounded-full bg-indigo-500 border-2 border-transparent hover:border-white box-color-btn" data-color="indigo"></button>
                    <button onclick="selectBoxColor('red')" class="w-8 h-8 rounded-full bg-red-500 border-2 border-transparent hover:border-white box-color-btn" data-color="red"></button>
                    <button onclick="selectBoxColor('emerald')" class="w-8 h-8 rounded-full bg-emerald-500 border-2 border-transparent hover:border-white box-color-btn" data-color="emerald"></button>
                    <button onclick="selectBoxColor('purple')" class="w-8 h-8 rounded-full bg-purple-500 border-2 border-transparent hover:border-white box-color-btn" data-color="purple"></button>
                    <button onclick="selectBoxColor('pink')" class="w-8 h-8 rounded-full bg-pink-500 border-2 border-transparent hover:border-white box-color-btn" data-color="pink"></button>
                    <button onclick="selectBoxColor('amber')" class="w-8 h-8 rounded-full bg-amber-500 border-2 border-transparent hover:border-white box-color-btn" data-color="amber"></button>
                    <button onclick="selectBoxColor('sky')" class="w-8 h-8 rounded-full bg-sky-500 border-2 border-transparent hover:border-white box-color-btn" data-color="sky"></button>
                </div>
            </div>
            <div class="flex gap-3 pt-2">
                <button onclick="closeModal('modal-create-box')" class="flex-1 py-2.5 rounded-lg border text-sub hover-bg transition-colors" style="border-color:var(--border-dark)">ยกเลิก</button>
                <button onclick="createCustomBox()" class="flex-1 py-2.5 rounded-lg text-white font-semibold transition-colors" style="background-color:var(--primary)">สร้าง</button>
            </div>
        </div>
    </div>
</div>

<!-- MODAL: Edit Box -->
<div id="modal-edit-box" class="modal-overlay hidden" onclick="if(event.target===this)closeModal('modal-edit-box')">
    <div class="section-bg rounded-2xl shadow-2xl p-6 w-full max-w-md mx-4 fade-in" style="max-height:90vh;overflow-y:auto">
        <h3 class="text-lg font-bold text-main mb-4"><i class="fa-solid fa-pen mr-2" style="color:var(--primary)"></i>แก้ไขกล่อง</h3>
        <div class="space-y-4">
            <div><label class="text-sm text-sub font-medium">ชื่อกล่อง</label><input id="edit-box-name" class="w-full mt-1 px-4 py-2.5 rounded-lg input-bg"></div>
            <div><label class="text-sm text-sub font-medium">Emoji</label>
                <div class="mt-1 flex items-center gap-3"><span id="edit-box-emoji-preview" class="text-3xl cursor-pointer" onclick="document.getElementById('edit-box-emoji-picker').classList.toggle('hidden')">📦</span><input id="edit-box-emoji-input" class="w-full px-4 py-2.5 rounded-lg input-bg" oninput="document.getElementById('edit-box-emoji-preview').innerText=this.value||'📦'"></div>
                <div id="edit-box-emoji-picker" class="emoji-picker mt-2 hidden"></div>
            </div>
            <div><label class="text-sm text-sub font-medium">Spreadsheet ID</label><input id="edit-box-sheet-id" class="w-full mt-1 px-4 py-2.5 rounded-lg input-bg text-xs"></div>
            <div class="grid grid-cols-2 gap-3">
                <div><label class="text-sm text-sub font-medium">ชื่อ Sheet</label><input id="edit-box-sheet-name" class="w-full mt-1 px-4 py-2.5 rounded-lg input-bg"></div>

    a.download = `dashboard-backup-${new Date().toISOString().slice(0,10)}.json`; a.click();

function importAllData(event) {
    const file = event.target.files[0]; if(!file) return;
    const reader = new FileReader();
    reader.onload = function(e) {
        try {
            const data = JSON.parse(e.target.result);
            if(data.custom_tabs){customTabs=data.custom_tabs;localStorage.setItem('custom_tabs',JSON.stringify(customTabs));}
            if(data.custom_boxes){customBoxes=data.custom_boxes;localStorage.setItem('custom_boxes',JSON.stringify(customBoxes));}
            if(data.todo_items){todoItems=data.todo_items;localStorage.setItem('todo_items',JSON.stringify(todoItems));}
            if(data.page_notes){pageNotes=data.page_notes;localStorage.setItem('page_notes',JSON.stringify(pageNotes));}
            alert('Import สำเร็จ!'); renderTabs(); switchTab(currentTab);
        } catch(err) { alert('ไฟล์ไม่ถูกต้อง: '+err.message); }
    };
    reader.readAsText(file); event.target.value='';
}

function switchTab(tabId) {
    currentTab = tabId; renderTabs();

    showSection('dashboard-section');

    if(tab.type==='overview') renderOverviewPage();
    else if(tab.type==='todo') renderTodoPage();

    else if(tab.type==='tee') { if(sheetsData.tee) renderTeePage(); else fetchTonTeeData('tee'); }
    else if(tab.type==='hub') { if(sheetsData.hub) renderHubPage(tabId); else fetchHubData(tabId); }
    else if(tab.type==='sheets') { if(sheetsData[tabId]) renderSheetsPage(tabId); else fetchData(tabId); }
    else if(tab.type==='custom') renderCustomTabPage(tabId);
}

async function fetchCustomBoxValues(tabId) {
    const apiKey=localStorage.getItem('google_api_key'); const boxes=customBoxes[tabId]||[];
    await Promise.all(boxes.map(async box=>{
        if(!box.sheetId||!box.sheetName||!box.cell){box.value='-';return;}
        try { const r=await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${box.sheetId}/values/${encodeURIComponent(box.sheetName+'!'+box.cell)}?key=${apiKey}`); if(!r.ok){box.value='Error';return;} const d=await r.json(); box.value=(d.values&&d.values[0]&&d.values[0][0])?d.values[0][0]:'0'; } catch{box.value='Error';}
    }));
    localStorage.setItem('custom_boxes',JSON.stringify(customBoxes));
}

        <div class="flex gap-1.5"><button onclick="event.stopPropagation();openEditBox('${tabId}',${idx})" class="text-sub opacity-0 group-hover:opacity-100 transition-all" style="color:var(--primary)"><i class="fa-solid fa-pen text-xs"></i></button>

function setupDragAndDrop(tabId) {

        item.addEventListener('dragend',()=>{item.classList.remove('dragging');document.querySelectorAll('.drag-over').forEach(el=>el.classList.remove('drag-over'));});
        item.addEventListener('dragover',e=>{e.preventDefault();e.dataTransfer.dropEffect='move';item.classList.add('drag-over');});
        item.addEventListener('dragleave',()=>{item.classList.remove('drag-over');});
        item.addEventListener('drop',e=>{e.preventDefault();item.classList.remove('drag-over');if(dragSrcIndex===null||dragSrcIndex===idx)return;const boxes=customBoxes[tabId];if(!boxes)return;const moved=boxes.splice(dragSrcIndex,1)[0];boxes.splice(idx,0,moved);localStorage.setItem('custom_boxes',JSON.stringify(customBoxes));dragSrcIndex=null;renderCustomBoxesOnly(tabId);});

async function fetchTonTeeSilent(targetId, spreadsheetId, isTon) {
    const apiKey=localStorage.getItem('google_api_key'); if(!apiKey) return;
    const meta=await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${spreadsheetId}?key=${apiKey}`);
    if(!meta.ok) throw new Error('API Error: '+meta.status);
    const metaData=await meta.json(); let names=metaData.sheets.map(s=>s.properties.title); let tabData=[];
    for(let i=0;i<names.length;i+=15){
        const ch=names.slice(i,i+15);
        let rangesQuery;
        if(isTon){ rangesQuery=ch.map(n=>`ranges=${encodeURIComponent("'"+n+"'!Z2")}`).join('&'); }
        else{ rangesQuery=ch.map(n=>`ranges=${encodeURIComponent("'"+n+"'!K2")}&ranges=${encodeURIComponent("'"+n+"'!Z2")}`).join('&'); }
        const bResp=await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${spreadsheetId}/values:batchGet?${rangesQuery}&key=${apiKey}`);
        if(!bResp.ok) continue; const bData=await bResp.json();
        for(let j=0;j<ch.length;j++){
            let ready=0;
            if(isTon){ const v=bData.valueRanges[j].values||[]; if(v[0]&&v[0][0]) ready=parseFloat(v[0][0].toString().replace(/,/g,''))||0; }
            else{ const kv=bData.valueRanges[j*2].values||[]; const zv=bData.valueRanges[j*2+1].values||[];
                const kVal=(kv[0]&&kv[0][0])?kv[0][0].toString().replace(/,/g,'').trim():'';
                const zVal=(zv[0]&&zv[0][0])?zv[0][0].toString().replace(/,/g,'').trim():'';
                if(zVal!==''&&!isNaN(Number(zVal))) ready=parseFloat(zVal);
                else if(kVal!==''&&!isNaN(Number(kVal))) ready=parseFloat(kVal);
            }
            tabData.push({title:ch[j],readyCount:ready,sheetId:spreadsheetId});
        }
    }
    sheetsData[targetId]=tabData.sort((a,b)=>b.readyCount-a.readyCount);
}

function filterSheetCards(){const q=document.getElementById('sheet-search').value.toLowerCase();document.querySelectorAll('.sheet-card').forEach(c=>{c.style.display=c.querySelector('.sheet-title').innerText.toLowerCase().includes(q)?'block':'none';});}

function renderTodoPage() {
    const content=document.getElementById('tab-content');
    const searchTerm=(document.getElementById('todo-search')?.value||'').toLowerCase();

    content.innerHTML=`<div class="fade-in">
        <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-6 gap-4">
            <h1 class="text-2xl font-bold text-main">✅ Smart Task Center</h1>
            <button onclick="clearDoneTodos()" class="text-xs text-red-500 bg-red-500/10 px-3 py-1.5 rounded-lg border border-red-500/20">ล้างงานเสร็จแล้ว</button>
        </div>
        ${renderNoteBox('todo')}
        <div class="card-bg rounded-2xl shadow-sm p-4 border border-subtle mb-8 glass-card">
            <div class="flex gap-4 items-center flex-wrap">
                <div class="flex-1 min-w-[200px] relative"><i class="fa-solid fa-magnifying-glass absolute left-4 top-3.5" style="color:var(--primary)"></i><input id="todo-search" oninput="renderTodoPage()" class="w-full pl-10 pr-4 py-2.5 rounded-xl input-bg" placeholder="ค้นหางาน..."></div>
                <div class="flex-1 min-w-[200px] relative"><i class="fa-solid fa-plus absolute left-4 top-3.5" style="color:var(--primary)"></i><input id="todo-input" class="w-full pl-10 pr-4 py-2.5 rounded-xl input-bg" placeholder="เพิ่มงานใหม่..."></div>
                <input id="todo-category" class="w-32 px-4 py-2.5 rounded-xl input-bg text-sm" placeholder="หมวดหมู่">
                <input id="todo-deadline" type="date" class="px-4 py-2.5 rounded-xl input-bg text-sm">
                <select id="todo-priority" class="px-3 py-2.5 rounded-xl input-bg text-sm"><option value="medium">🟡 ปานกลาง</option><option value="high">🔴 ด่วน</option><option value="low">🟢 เบาๆ</option></select>
                <button onclick="addTodo()" class="text-white px-6 py-2.5 rounded-xl font-bold transition-all shadow-lg" style="background-color:var(--primary)">เพิ่มงาน</button>
            </div>
        </div>
        <div class="kanban-grid">
            ${Object.entries(cols).map(([id,col])=>`
                <div class="kanban-col border" style="background:rgba(0,0,0,0.1);border-color:var(--border-dark)" ondragover="event.preventDefault()" ondrop="dropToColumn(event,'${id}')">
                    <div class="flex items-center justify-between mb-4 px-2"><h3 class="font-bold text-sm text-main uppercase tracking-wider">${col.title}</h3><span class="text-[10px] px-2 py-0.5 rounded-full font-bold" style="background:var(--primary-glow);color:var(--primary)">${col.items.length}</span></div>
                    <div class="space-y-3" id="col-${id}">
                        ${col.items.map(t=>renderTodoCard(t)).join('')}
                        ${col.items.length===0?`<div class="text-center py-10 text-[10px] text-sub border-2 border-dashed rounded-xl" style="border-color:var(--border-dark)">วางงานที่นี่</div>`:''}
                    </div>
                </div>`).join('')}
        </div>
    </div>`;
}
function renderTodoCard(t) {
    const idx=todoItems.indexOf(t);
    const pClass={high:'border-l-rose-500',medium:'border-l-amber-500',low:'border-l-emerald-500'};
    let isUrgent=false; if(t.deadline&&t.column!=='finished'){const today=new Date().toISOString().split('T')[0];if(t.deadline<=today)isUrgent=true;}
    return `<div class="glass-card p-4 rounded-2xl shadow-sm border-l-4 ${pClass[t.priority]} kanban-item group relative" draggable="true" ondragstart="dragTodo(event,${idx})">
        <div class="flex flex-col gap-2">
            <div class="flex items-center justify-between">
                ${t.category?`<span class="badge ${t.priority==='high'?'badge-urgent':'badge-normal'}">${t.category}</span>`:'<span></span>'}
                <button onclick="deleteTodo(${idx})" class="text-sub hover:text-red-500 opacity-0 group-hover:opacity-100 transition-all"><i class="fa-solid fa-trash text-[10px]"></i></button>
            </div>
            <p class="text-sm font-semibold text-main ${t.column==='finished'?'line-through opacity-50':''}">${t.text}</p>
            <div class="flex items-center justify-between mt-1">
                <div class="flex items-center gap-1.5 text-[9px] ${isUrgent?'deadline-warning':'text-sub'}"><i class="fa-solid fa-clock"></i><span>${t.deadline||'ไม่มีกำหนด'}</span></div>
                <div class="flex gap-1">
                    ${t.column!=='waiting'?`<button onclick="moveTodoColumn(${idx},'waiting')" class="text-sub hover:text-indigo-500"><i class="fa-solid fa-arrow-left text-[9px]"></i></button>`:''}
                    ${t.column!=='finished'?`<button onclick="moveTodoColumn(${idx},'finished')" class="text-sub hover:text-emerald-500"><i class="fa-solid fa-check text-[9px]"></i></button>`:''}
                    ${t.column==='waiting'?`<button onclick="moveTodoColumn(${idx},'processing')" class="text-sub hover:text-amber-500"><i class="fa-solid fa-arrow-right text-[9px]"></i></button>`:''}
                </div>
            </div>
        </div>
    </div>`;
}
function dragTodo(ev,idx){ev.dataTransfer.setData("todoIdx",idx);}
function dropToColumn(ev,col){ev.preventDefault();const idx=ev.dataTransfer.getData("todoIdx");moveTodoColumn(parseInt(idx),col);}
function moveTodoColumn(idx,col){todoItems[idx].column=col;todoItems[idx].done=(col==='finished');localStorage.setItem('todo_items',JSON.stringify(todoItems));renderTodoPage();renderSidebars();}
function addTodo(){const input=document.getElementById('todo-input');const text=input.value.trim();if(!text)return;const category=document.getElementById('todo-category').value.trim();const deadline=document.getElementById('todo-deadline').value;const priority=document.getElementById('todo-priority').value;todoItems.unshift({text,priority,done:false,date:new Date().toLocaleDateString('th-TH'),category,deadline,column:'waiting'});localStorage.setItem('todo_items',JSON.stringify(todoItems));input.value='';document.getElementById('todo-category').value='';document.getElementById('todo-deadline').value='';renderTodoPage();renderSidebars();}
function deleteTodo(i){if(!confirm('ลบงานนี้?'))return;todoItems.splice(i,1);localStorage.setItem('todo_items',JSON.stringify(todoItems));renderTodoPage();renderSidebars();}
function clearDoneTodos(){if(!confirm('ลบงานเสร็จแล้วทั้งหมด?'))return;todoItems=todoItems.filter(t=>t.column!=='finished');localStorage.setItem('todo_items',JSON.stringify(todoItems));renderTodoPage();renderSidebars();}

    await fetchCustomBoxValues(tabId);
    content.innerHTML=`<div class="fade-in">
        <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-6 gap-4">
            <div><h1 class="text-2xl font-bold text-main">${tab?tab.emoji:''} ${tab?tab.name:tabId}</h1><p class="text-sub text-sm mt-1">กล่องติดตามงานที่กำหนดเอง</p></div>
            <div class="flex gap-2">
                <button onclick="openModal('modal-create-box')" class="text-white px-4 py-2 rounded-lg font-semibold flex items-center gap-2" style="background-color:var(--primary)"><i class="fa-solid fa-plus"></i> เพิ่มกล่อง</button>
                <button onclick="renderCustomTabPage('${tabId}')" class="card-bg text-main px-4 py-2 rounded-lg shadow border border-subtle hover-bg"><i class="fa-solid fa-rotate-right"></i></button>
                <button onclick="deleteCustomTab('${tabId}')" class="bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded-lg"><i class="fa-solid fa-trash"></i></button>
            </div>
        </div>
        ${renderNoteBox(tabId)}
        ${boxes.length===0?`<div class="text-center py-16"><div class="text-6xl mb-4">📦</div><h3 class="text-lg font-semibold text-main mb-2">ยังไม่มีกล่อง</h3><button onclick="openModal('modal-create-box')" class="text-white px-6 py-3 rounded-lg font-semibold" style="background-color:var(--primary)"><i class="fa-solid fa-plus mr-2"></i>สร้างกล่องแรก</button></div>`:`
        <div id="custom-boxes-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
            ${boxes.map((box,idx)=>{const c=box.color||'indigo';const val=box.value!==null?box.value:'...';return `
            <div class="glass-card rounded-2xl p-6 shadow-sm hover:shadow-md transition-all relative overflow-hidden border-l-4 border-l-${c}-500 draggable-box group" data-idx="${idx}">
                <div class="flex items-center justify-between mb-3"><div class="flex items-center gap-2 min-w-0"><span class="text-2xl flex-shrink-0">${box.emoji}</span><h4 class="font-bold text-main truncate">${box.name}</h4></div>
                <div class="flex gap-1.5"><button onclick="event.stopPropagation();openEditBox('${tabId}',${idx})" class="text-sub opacity-0 group-hover:opacity-100" style="color:var(--primary)"><i class="fa-solid fa-pen text-xs"></i></button>
                <button onclick="event.stopPropagation();deleteBoxDirect('${tabId}',${idx})" class="text-sub hover:text-red-500 opacity-0 group-hover:opacity-100"><i class="fa-solid fa-trash text-xs"></i></button></div></div>
                <div class="text-3xl font-bold text-${c}-500 mb-2">${val}</div>
                ${box.link?`<a href="${box.link}" target="_blank" onclick="event.stopPropagation()" class="text-xs font-medium flex items-center gap-1" style="color:var(--primary)">เปิดลิงก์ <i class="fa-solid fa-arrow-up-right-from-square" style="font-size:9px"></i></a>`:''}</div>`;}).join('')}
        </div>`}
    </div>`;
    setupDragAndDrop(tabId);
}
</script>
</body>
</html>
