<!DOCTYPE html>
<html lang="th">
<head>

    <title>Content Production Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Prompt', sans-serif; transition: background-color 0.3s, color 0.3s; }
        body.light { background-color: #f3f4f6; color: #1f2937; }
        body.dark { background-color: #0f172a; color: #e2e8f0; }
        .glass-card { backdrop-filter: blur(10px); transition: background-color 0.3s, border-color 0.3s; }
        .light .glass-card { background: rgba(255,255,255,0.95); border: 1px solid rgba(229,231,235,1); }
        .dark .glass-card { background: rgba(30,41,59,0.95); border: 1px solid rgba(51,65,85,1); }
        .light .card-bg { background: #fff; border-color: #f3f4f6; }
        .dark .card-bg { background: #1e293b; border-color: #334155; }
        .light .nav-bg { background: #4f46e5; }
        .dark .nav-bg { background: #1e293b; }
        .light .input-bg { background: #fff; border-color: #d1d5db; color: #1f2937; }
        .dark .input-bg { background: #334155; border-color: #475569; color: #e2e8f0; }
        .light .tab-active { color: #4f46e5; border-color: #4f46e5; background: rgba(79,70,229,0.05); }
        .dark .tab-active { color: #818cf8; border-color: #818cf8; background: rgba(129,140,248,0.1); }
        .light .tab-inactive { color: #6b7280; }
        .dark .tab-inactive { color: #94a3b8; }
        .light .text-main { color: #1f2937; }
        .dark .text-main { color: #e2e8f0; }
        .light .text-sub { color: #6b7280; }
        .dark .text-sub { color: #94a3b8; }
        .light .section-bg { background: #fff; }
        .dark .section-bg { background: #1e293b; }
        .light .border-subtle { border-color: #f3f4f6; }
        .dark .border-subtle { border-color: #334155; }
        .light .hover-bg:hover { background: #f9fafb; }
        .dark .hover-bg:hover { background: #334155; }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100; display: flex; align-items: center; justify-content: center; }
        .priority-high { border-left: 4px solid #ef4444; }
        .priority-medium { border-left: 4px solid #f59e0b; }
        .priority-low { border-left: 4px solid #22c55e; }
        .emoji-picker { display: grid; grid-template-columns: repeat(8, 1fr); gap: 4px; max-height: 200px; overflow-y: auto; }
        .emoji-picker button { font-size: 1.3rem; padding: 4px; border-radius: 6px; cursor: pointer; border: none; background: transparent; }
        .emoji-picker button:hover { background: rgba(99,102,241,0.15); }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
        .stock-bar { height: 8px; border-radius: 9999px; transition: width 0.6s ease; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 3px; }
        /* Drag & Drop */
        .dragging { opacity: 0.4; transform: scale(0.95); }
        .drag-over { border: 2px dashed #6366f1 !important; }
        .draggable-box { cursor: grab; }
        .draggable-box:active { cursor: grabbing; }
        /* Notes */
        .note-textarea { resize: vertical; min-height: 80px; }
    </style>
</head>

function exportAllData() {
    const data = { custom_tabs: customTabs, custom_boxes: customBoxes, todo_items: todoItems, page_notes: pageNotes, exported_at: new Date().toISOString() };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
    a.download = `dashboard-backup-${new Date().toISOString().slice(0,10)}.json`; a.click();
}
function importAllData(event) {
    const file = event.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = function(e) {
        try {
            const data = JSON.parse(e.target.result);
            if (data.custom_tabs) { customTabs = data.custom_tabs; localStorage.setItem('custom_tabs', JSON.stringify(customTabs)); }
            if (data.custom_boxes) { customBoxes = data.custom_boxes; localStorage.setItem('custom_boxes', JSON.stringify(customBoxes)); }
            if (data.todo_items) { todoItems = data.todo_items; localStorage.setItem('todo_items', JSON.stringify(todoItems)); }
            if (data.page_notes) { pageNotes = data.page_notes; localStorage.setItem('page_notes', JSON.stringify(pageNotes)); }
            alert('Import สำเร็จ!');
            renderTabs(); switchTab(currentTab);
        } catch(err) { alert('ไฟล์ไม่ถูกต้อง: ' + err.message); }
    };
    reader.readAsText(file);
    event.target.value = '';
}

// ===========================
// DRAG & DROP for custom boxes
// ===========================
function setupDragAndDrop(tabId) {
    const container = document.getElementById('custom-boxes-grid');
    if (!container) return;
    const items = container.querySelectorAll('.draggable-box');
    items.forEach((item, idx) => {
        item.setAttribute('draggable', 'true');
        item.addEventListener('dragstart', e => { dragSrcIndex = idx; item.classList.add('dragging'); e.dataTransfer.effectAllowed = 'move'; });
        item.addEventListener('dragend', () => { item.classList.remove('dragging'); document.querySelectorAll('.drag-over').forEach(el=>el.classList.remove('drag-over')); });
        item.addEventListener('dragover', e => { e.preventDefault(); e.dataTransfer.dropEffect='move'; item.classList.add('drag-over'); });
        item.addEventListener('dragleave', () => { item.classList.remove('drag-over'); });
        item.addEventListener('drop', e => {
            e.preventDefault(); item.classList.remove('drag-over');
            if (dragSrcIndex === null || dragSrcIndex === idx) return;
            const boxes = customBoxes[tabId]; if(!boxes)return;
            const moved = boxes.splice(dragSrcIndex, 1)[0];
            boxes.splice(idx, 0, moved);
            localStorage.setItem('custom_boxes', JSON.stringify(customBoxes));
            dragSrcIndex = null;
            renderCustomBoxesOnly(tabId);
        });
    });
}

// Fetch box values
async function fetchCustomBoxValues(tabId) {
    const apiKey = localStorage.getItem('google_api_key');
    const boxes = customBoxes[tabId]||[];
    await Promise.all(boxes.map(async box => {
        if(!box.sheetId||!box.sheetName||!box.cell){box.value='-';return;}
        try {
            const r = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${box.sheetId}/values/${encodeURIComponent(box.sheetName+'!'+box.cell)}?key=${apiKey}`);
            if(!r.ok){box.value='Error';return;}
            const d = await r.json();
            box.value = (d.values&&d.values[0]&&d.values[0][0]) ? d.values[0][0] : '0';
        } catch { box.value='Error'; }
    }));
    localStorage.setItem('custom_boxes',JSON.stringify(customBoxes));
}

// FETCH DATA
// ===========================
async function fetchData(tab=currentTab, forceRefresh=false) {
    const apiKey = localStorage.getItem('google_api_key'); showSection('loading-section');
    try {
        if (['ai','horoscope','others'].includes(tab)) {
            const labels={ai:'งาน AI',horoscope:'ดูดวง',others:'งานอื่นๆ'}; updateLoadingText(`กำลังดาวน์โหลดข้อมูล${labels[tab]}...`);
            let sources = tab==='ai'?AI_SOURCES:tab==='horoscope'?HOROSCOPE_SOURCES:OTHERS_SOURCES;
            let tabData=[];
            const results = await Promise.all(sources.map(src => {
                if(src.id==='MOCK_ID') return Promise.resolve({source:src,data:{values:[[Math.floor(Math.random()*50)+5]]}});
                return fetch(`https://sheets.googleapis.com/v4/spreadsheets/${src.id}/values/${encodeURIComponent(src.sheetName+'!'+src.cell)}?key=${apiKey}`)
                    .then(r=>{if(!r.ok)throw new Error(`ไม่สามารถดึง ${src.displayName}`);return r.json();}).then(d=>({source:src,data:d}));
            }));
            results.forEach(r=>{let v=0;if(r.data.values&&r.data.values[0]&&r.data.values[0][0])v=parseInt(r.data.values[0][0].toString().replace(/,/g,''),10)||0;tabData.push({title:r.source.displayName,readyCount:v,waitingCount:0,link:r.source.link});});
            sheetsData[tab]=tabData; renderSheetsPage(tab); showSection('dashboard-section'); return;
        }
        const sheetLabels={main:'บทความ / โพสต์',youtube:'Youtube',yok:'หยก'}; updateLoadingText(`กำลังตรวจสอบชีท (${sheetLabels[tab]})...`);
        const sheetId=SPREADSHEETS[tab]; const meta=await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${sheetId}?key=${apiKey}`);
        if(!meta.ok)throw new Error(`API Error: ${meta.status}`); const metaData=await meta.json();
        let names=metaData.sheets.map(s=>s.properties.title);
        if(tab==='yok')names=names.filter(n=>n.includes('ClickBait')||n.toLowerCase().includes('info'));
        let tabData=[]; const chunk=15;
        for(let i=0;i<names.length;i+=chunk){
            const ch=names.slice(i,i+chunk); updateLoadingText(`ดาวน์โหลดชุดที่ ${Math.floor(i/chunk)+1}/${Math.ceil(names.length/chunk)}...`,`ชีท ${i+1}-${Math.min(i+chunk,names.length)}`);
            const ranges=ch.map(n=>{if(tab==='main')return `ranges=${encodeURIComponent(n+'!F:F')}&ranges=${encodeURIComponent(n+'!K2')}`;if(tab==='youtube')return `ranges=${encodeURIComponent(n+'!P2')}`;if(tab==='yok'){const c=n.includes('ClickBait')?'H2':'M2';return `ranges=${encodeURIComponent(n+'!'+c)}`;}}).join('&');
            const bResp=await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${sheetId}/values:batchGet?${ranges}&key=${apiKey}`);
            if(!bResp.ok)throw new Error(`Batch Error: ${bResp.status}`); const bData=await bResp.json();
            for(let j=0;j<ch.length;j++){let ready=0,waiting=0;
                if(tab==='main'){const colF=bData.valueRanges[j*2].values||[];const colK=bData.valueRanges[j*2+1].values||[];colF.forEach(r=>{if(r[0]&&r[0].toString().trim().toUpperCase()==='N')waiting++;});if(colK[0]&&colK[0][0])ready=parseInt(colK[0][0].toString().replace(/,/g,''),10)||0;}
                else{const d=bData.valueRanges[j].values||[];if(d[0]&&d[0][0])ready=parseInt(d[0][0].toString().replace(/,/g,''),10)||0;}
                tabData.push({title:ch[j],readyCount:ready,waitingCount:waiting,sheetId});
            }
        }
        sheetsData[tab]=tabData; renderSheetsPage(tab); showSection('dashboard-section');
    } catch(e){ console.error(e); alert(`เกิดข้อผิดพลาด: ${e.message}`); showSection('login-section'); }
}

    await Promise.all(['main','youtube','yok','ai','horoscope'].map(async t=>{if(!sheetsData[t])try{await fetchDataSilent(t);}catch(e){console.error(e);}}));

    const sheetId=SPREADSHEETS[tab];const meta=await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${sheetId}?key=${apiKey}`);if(!meta.ok)return;const metaData=await meta.json();

    let tabData=[];const chunk=15;
    for(let i=0;i<names.length;i+=chunk){const ch=names.slice(i,i+chunk);
        const ranges=ch.map(n=>{if(tab==='main')return `ranges=${encodeURIComponent(n+'!F:F')}&ranges=${encodeURIComponent(n+'!K2')}`;if(tab==='youtube')return `ranges=${encodeURIComponent(n+'!P2')}`;if(tab==='yok'){const c=n.includes('ClickBait')?'H2':'M2';return `ranges=${encodeURIComponent(n+'!'+c)}`;}}).join('&');
        const bResp=await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${sheetId}/values:batchGet?${ranges}&key=${apiKey}`);if(!bResp.ok)continue;const bData=await bResp.json();
        for(let j=0;j<ch.length;j++){let ready=0,waiting=0;if(tab==='main'){const colF=bData.valueRanges[j*2].values||[];const colK=bData.valueRanges[j*2+1].values||[];colF.forEach(r=>{if(r[0]&&r[0].toString().trim().toUpperCase()==='N')waiting++;});if(colK[0]&&colK[0][0])ready=parseInt(colK[0][0].toString().replace(/,/g,''),10)||0;}else{const d=bData.valueRanges[j].values||[];if(d[0]&&d[0][0])ready=parseInt(d[0][0].toString().replace(/,/g,''),10)||0;}tabData.push({title:ch[j],readyCount:ready,waitingCount:waiting,sheetId});}
    }
    sheetsData[tab]=tabData;
}

function addTodo(){const input=document.getElementById('todo-input');const text=input.value.trim();if(!text)return;todoItems.push({text,priority:document.getElementById('todo-priority').value,done:false,date:new Date().toLocaleDateString('th-TH')});localStorage.setItem('todo_items',JSON.stringify(todoItems));input.value='';renderTodoPage();}
function toggleTodo(i){todoItems[i].done=!todoItems[i].done;localStorage.setItem('todo_items',JSON.stringify(todoItems));renderTodoPage();}
function deleteTodo(i){todoItems.splice(i,1);localStorage.setItem('todo_items',JSON.stringify(todoItems));renderTodoPage();}
function clearDoneTodos(){todoItems=todoItems.filter(t=>!t.done);localStorage.setItem('todo_items',JSON.stringify(todoItems));renderTodoPage();}

    const cRGB={indigo:[79,70,229],red:[220,38,38],emerald:[16,185,129],purple:[168,85,247],pink:[236,72,153],slate:[100,116,139]};const c=cRGB[color]||cRGB.indigo;
    chartInstance=new Chart(ctx,{type:'bar',data:{labels:sortedTop.map(i=>i.title),datasets:[{label:'จำนวน Stock',data:sortedTop.map(i=>i.readyCount),backgroundColor:sortedTop.map((_,i)=>`rgba(${c[0]},${c[1]},${c[2]},${i===0?0.8:0.4})`),borderColor:`rgb(${c[0]},${c[1]},${c[2]})`,borderWidth:1,borderRadius:6}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>` ${ctx.raw} รายการ`}}},scales:{y:{beginAtZero:true,grid:{color:isDark?'#334155':'#f3f4f6'}},x:{grid:{display:false},ticks:{callback:function(v){const l=this.getLabelForValue(v);return l.length>15?l.substr(0,15)+'...':l;}}}}}});

    // Cards
    const grid=document.getElementById('sheets-cards-grid');
    data.forEach(sheet=>{
        const hasReady=sheet.readyCount>0;const hasWaiting=sheet.waitingCount>0;
        const readyBadge=hasReady?`<span class="px-2.5 py-1 bg-emerald-100 text-emerald-700 text-xs font-semibold rounded-full"><i class="fa-solid fa-check-circle mr-1"></i>มี Stock</span>`:`<span class="px-2.5 py-1 bg-gray-100 text-gray-500 text-xs font-semibold rounded-full">ไม่มี Stock</span>`;
        const waitingBadge=hasWaiting?`<span class="px-2.5 py-1 bg-amber-100 text-amber-700 text-xs font-semibold rounded-full"><i class="fa-solid fa-clock mr-1"></i>รอสร้าง (${sheet.waitingCount})</span>`:`<span class="px-2.5 py-1 bg-blue-100 text-blue-700 text-xs font-semibold rounded-full"><i class="fa-solid fa-thumbs-up mr-1"></i>สร้างครบ</span>`;
        const waitingRow=tab==='main'?`<div class="flex justify-between items-center mt-3 pt-3 border-t border-subtle"><div><span class="text-sm text-sub">Stock รอสร้าง</span><br><span class="text-2xl font-bold text-amber-500">${sheet.waitingCount}</span></div><div class="text-right">${waitingBadge}</div></div>`:'';
        const url=sheet.link||`https://docs.google.com/spreadsheets/d/${sheet.sheetId}/edit`;
        grid.innerHTML+=`
        <div class="glass-card rounded-2xl p-6 shadow-sm hover:shadow-md transition-shadow relative overflow-hidden group sheet-card">
            ${hasReady?`<div class="absolute top-0 right-0 w-2 h-full bg-${color}-500"></div>`:''}
            ${hasWaiting&&tab==='main'?`<div class="absolute top-0 right-0 w-2 h-full bg-amber-400"></div>`:''}
            <div class="flex justify-between items-start mb-4">
    <h3 class="font-bold text-lg text-main truncate sheet-title pr-4" title="${sheet.title}">${sheet.title}</h3>
    <button onclick="event.stopPropagation(); deleteSheetCard('${tab}', \`${sheet.title}\`)" class="text-gray-400 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-opacity" title="ลบกล่องนี้">
        <i class="fa-solid fa-trash"></i>
    </button>
</div>
            <div class="space-y-2"><div class="flex justify-between items-center"><div><span class="text-sm text-sub">จำนวน Stock ${itemLabel}</span><br><span class="text-2xl font-bold text-${color}-500">${sheet.readyCount}</span></div><div class="text-right">${readyBadge}</div></div>${waitingRow}</div>
            <div class="mt-5 pt-3 border-t border-subtle"><a href="${url}" target="_blank" class="text-sm text-indigo-500 hover:text-indigo-700 flex items-center gap-1 font-medium transition-colors">เปิดใน Google Sheets <i class="fa-solid fa-arrow-up-right-from-square text-xs ml-1"></i></a></div>
        </div>`;
    });
}
function filterSheetCards(){const q=document.getElementById('sheet-search').value.toLowerCase();document.querySelectorAll('.sheet-card').forEach(card=>{card.style.display=card.querySelector('.sheet-title').innerText.toLowerCase().includes(q)?'block':'none';});}

// ===========================
// RENDER: CUSTOM TAB PAGE
// ===========================
async function renderCustomTabPage(tabId) {
    const content=document.getElementById('tab-content');const tab=getAllTabs().find(t=>t.id===tabId);const boxes=customBoxes[tabId]||[];
    content.innerHTML=`<div class="text-center py-10"><div class="inline-block animate-spin rounded-full h-10 w-10 border-4 border-indigo-500 border-t-transparent mb-3"></div><p class="text-sub">กำลังโหลด...</p></div>`;
    await fetchCustomBoxValues(tabId);
    content.innerHTML=`
    <div class="fade-in">
        <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-6 gap-4">
            <div><h1 class="text-2xl font-bold text-main">${tab?tab.emoji:''} ${tab?tab.name:tabId}</h1><p class="text-sub text-sm mt-1">กล่องติดตามงานที่กำหนดเอง</p></div>
            <div class="flex gap-2">
                <button onclick="openModal('modal-create-box')" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg font-semibold transition-colors flex items-center gap-2"><i class="fa-solid fa-plus"></i> เพิ่มกล่อง</button>
                <button onclick="renderCustomTabPage('${tabId}')" class="card-bg text-main px-4 py-2 rounded-lg shadow border border-subtle hover-bg transition-colors"><i class="fa-solid fa-rotate-right"></i></button>
                <button onclick="deleteCustomTab('${tabId}')" class="bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded-lg transition-colors"><i class="fa-solid fa-trash"></i></button>
            </div>
        </div>
        ${renderNoteBox(tabId)}
        ${boxes.length===0?`
        <div class="text-center py-16"><div class="text-6xl mb-4">📦</div><h3 class="text-lg font-semibold text-main mb-2">ยังไม่มีกล่องติดตามงาน</h3><p class="text-sub text-sm mb-6">กดปุ่ม "เพิ่มกล่อง" เพื่อสร้างกล่องแรก</p>
        <button onclick="openModal('modal-create-box')" class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-3 rounded-lg font-semibold transition-colors"><i class="fa-solid fa-plus mr-2"></i>สร้างกล่องแรก</button></div>`:`
        <div id="custom-boxes-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
            ${boxes.map((box,idx)=>{const c=box.color||'indigo';const val=box.value!==null?box.value:'...';return `
            <div class="glass-card rounded-2xl p-6 shadow-sm hover:shadow-md transition-all relative overflow-hidden border-l-4 border-l-${c}-500 draggable-box group" data-idx="${idx}">
                <div class="flex items-center justify-between mb-3">
                    <div class="flex items-center gap-2 min-w-0"><span class="text-2xl flex-shrink-0">${box.emoji}</span><h4 class="font-bold text-main truncate">${box.name}</h4></div>
                    <div class="flex gap-1.5">
                        <button onclick="event.stopPropagation();openEditBox('${tabId}',${idx})" class="text-sub hover:text-indigo-500 transition-colors opacity-0 group-hover:opacity-100" title="แก้ไข"><i class="fa-solid fa-pen text-xs"></i></button>
                        <button onclick="event.stopPropagation();deleteBoxDirect('${tabId}',${idx})" class="text-sub hover:text-red-500 transition-colors opacity-0 group-hover:opacity-100" title="ลบ"><i class="fa-solid fa-trash text-xs"></i></button>
                    </div>
                </div>
                <div class="text-3xl font-bold text-${c}-500 mb-2">${val}</div>
                ${box.link?`<a href="${box.link}" target="_blank" onclick="event.stopPropagation()" class="text-xs text-indigo-500 hover:text-indigo-700 flex items-center gap-1 font-medium">เปิดลิงก์ <i class="fa-solid fa-arrow-up-right-from-square" style="font-size:9px"></i></a>`:''}
                <div class="absolute top-2 right-12 text-sub cursor-grab opacity-0 group-hover:opacity-60"><i class="fa-solid fa-grip-vertical text-xs"></i></div>
            </div>`;}).join('')}
        </div>`}
    </div>`;
    setupDragAndDrop(tabId);
}

function deleteSheetCard(tab, title) {
    if(!confirm(`ต้องการลบกล่อง "${title}" ออกจากหน้าจอนี้ใช่หรือไม่?`)) return;
    
    // บันทึกชื่อกล่องที่ถูกลบลงใน localStorage
    let hiddenCards = JSON.parse(localStorage.getItem('hidden_cards') || '{}');
    if(!hiddenCards[tab]) hiddenCards[tab] = [];
    hiddenCards[tab].push(title);
    localStorage.setItem('hidden_cards', JSON.stringify(hiddenCards));
    
    // รีโหลดหน้าแท็บนั้นใหม่
    renderSheetsPage(tab);
}
